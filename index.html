<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demo Bet & Trade Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase CDN (১০০% গ্যারান্টিড কাজ করবে) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: pan-y; }
        .neon-text { text-shadow: 0 0 10px #4ade80, 0 0 20px #4ade80; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden-section { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <!-- Auth Section -->
    <div id="auth-section" class="flex items-center justify-center min-h-screen bg-gray-800 p-4">
        <div class="glass p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <div class="mb-8">
                <i class="fa-solid fa-gamepad text-5xl text-green-400 mb-2 neon-text"></i>
                <h1 class="text-3xl font-extrabold text-green-400 neon-text">DemoX</h1>
                <p class="text-gray-400 text-sm mt-1">Betting & Trading Platform</p>
            </div>
            
            <div id="login-form" class="space-y-4">
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-4 text-gray-400"></i>
                    <input type="email" id="email" placeholder="Email Address" class="w-full pl-12 p-3.5 rounded-xl bg-gray-700 text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-green-400">
                </div>
                
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-4 text-gray-400"></i>
                    <input type="password" id="password" placeholder="Password" class="w-full pl-12 p-3.5 rounded-xl bg-gray-700 text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-green-400">
                </div>

                <div class="pt-2 space-y-3">
                    <button onclick="loginWithEmail()" class="w-full bg-green-500 hover:bg-green-600 text-gray-900 p-3.5 rounded-xl font-bold text-lg shadow-[0_0_15px_rgba(74,222,128,0.4)] transition">Login</button>
                    <button onclick="registerWithEmail()" class="w-full border-2 border-green-500 text-green-400 hover:bg-green-500 hover:text-gray-900 p-3.5 rounded-xl font-bold text-lg transition">Create Account</button>
                </div>

                <p class="text-sm mt-4 text-gray-400 cursor-pointer hover:text-green-400 underline decoration-gray-600 underline-offset-4" onclick="resetPassword()">Forgot Password?</p>
            </div>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="app-section" class="hidden-section flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar Navigation -->
        <nav class="w-full md:w-64 bg-gray-800 p-5 flex flex-col gap-3 shadow-xl md:h-screen md:sticky md:top-0">
            <h2 class="text-2xl font-bold text-green-400 neon-text text-center mb-2 hidden md:block">DemoX</h2>
            
            <div class="bg-gray-700 p-4 rounded-xl text-center shadow-inner mb-2 border border-gray-600">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">My Wallet</p>
                <p class="text-2xl font-bold text-yellow-400"><i class="fa-solid fa-coins"></i> <span id="user-balance">0.00</span></p>
            </div>
            
            <div class="flex md:flex-col overflow-x-auto md:overflow-visible gap-2 pb-2 md:pb-0 hide-scroll">
                <button onclick="showPage('dashboard')" class="nav-btn bg-gray-700 hover:bg-gray-600 p-3 rounded-lg text-left whitespace-nowrap"><i class="fa-solid fa-house w-6 text-center"></i> Dashboard</button>
                <button onclick="showPage('trading')" class="nav-btn bg-gray-700 hover:bg-gray-600 p-3 rounded-lg text-left whitespace-nowrap"><i class="fa-solid fa-chart-line w-6 text-center"></i> Trading</button>
                <button onclick="showPage('games')" class="nav-btn bg-gray-700 hover:bg-gray-600 p-3 rounded-lg text-left whitespace-nowrap"><i class="fa-solid fa-gamepad w-6 text-center"></i> Games</button>
                <button onclick="showPage('wallet')" class="nav-btn bg-gray-700 hover:bg-gray-600 p-3 rounded-lg text-left whitespace-nowrap"><i class="fa-solid fa-wallet w-6 text-center"></i> Wallet</button>
                <button onclick="showPage('leaderboard')" class="nav-btn bg-gray-700 hover:bg-gray-600 p-3 rounded-lg text-left whitespace-nowrap"><i class="fa-solid fa-trophy w-6 text-center text-yellow-400"></i> Rank</button>
                <button id="admin-btn" onclick="showPage('admin')" class="hidden-section nav-btn bg-red-900/50 border border-red-500 p-3 rounded-lg text-left whitespace-nowrap text-red-300"><i class="fa-solid fa-shield-halved w-6 text-center"></i> Admin</button>
            </div>
            
            <div class="mt-auto hidden md:block">
                <button onclick="logout()" class="w-full bg-red-500/20 text-red-400 border border-red-500 hover:bg-red-500 hover:text-white p-3 rounded-lg font-bold transition"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </nav>

        <!-- Content Area -->
        <main class="flex-1 p-4 sm:p-6 overflow-y-auto bg-gray-900 pb-20 md:pb-6">
            
            <!-- Dashboard Page -->
            <div id="page-dashboard" class="page-section">
                <h2 class="text-2xl sm:text-3xl font-bold mb-6">Welcome back! 👋</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                    <div class="glass p-6 rounded-2xl border-t-4 border-green-500 cursor-pointer" onclick="showPage('trading')">
                        <i class="fa-solid fa-chart-line text-4xl text-green-400 mb-3"></i>
                        <h3 class="text-xl font-bold">Trade Markets</h3>
                    </div>
                    <div class="glass p-6 rounded-2xl border-t-4 border-purple-500 cursor-pointer" onclick="showPage('games')">
                        <i class="fa-solid fa-dice text-4xl text-purple-400 mb-3"></i>
                        <h3 class="text-xl font-bold">Play Games</h3>
                    </div>
                </div>
                <button onclick="logout()" class="md:hidden mt-8 w-full bg-red-500/20 text-red-400 border border-red-500 p-3 rounded-xl font-bold"><i class="fa-solid fa-right-from-bracket"></i> Logout Account</button>
            </div>

            <!-- Trading Page -->
            <div id="page-trading" class="page-section hidden-section">
                <h2 class="text-2xl sm:text-3xl font-bold mb-6 text-green-400">Live Trading</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="col-span-2 glass p-4 rounded-2xl">
                        <select id="trade-asset" class="bg-gray-800 p-3 rounded-xl text-white mb-4 w-full sm:w-auto">
                            <option value="BTC/USD">BTC/USD</option>
                            <option value="GOLD">GOLD</option>
                        </select>
                        <div class="text-3xl font-mono text-green-400 bg-gray-900 p-2 rounded text-center mb-4" id="live-price">0.00</div>
                        <canvas id="tradingChart" height="200" class="w-full"></canvas>
                    </div>
                    <div class="glass p-5 rounded-2xl flex flex-col gap-4">
                        <input type="number" id="trade-amount" placeholder="Amount" class="w-full p-3 bg-gray-800 rounded-xl outline-none">
                        <select id="trade-duration" class="w-full p-3 bg-gray-800 rounded-xl outline-none">
                            <option value="10">10 Sec (80%)</option>
                        </select>
                        <div class="flex gap-3">
                            <button onclick="placeTrade('UP')" class="flex-1 bg-green-500 text-gray-900 p-4 rounded-xl font-bold">UP</button>
                            <button onclick="placeTrade('DOWN')" class="flex-1 bg-red-500 text-white p-4 rounded-xl font-bold">DOWN</button>
                        </div>
                        <div id="active-trades" class="mt-4 space-y-2 text-sm max-h-40 overflow-y-auto"></div>
                    </div>
                </div>
            </div>

            <!-- Games Page -->
            <div id="page-games" class="page-section hidden-section">
                <h2 class="text-2xl sm:text-3xl font-bold mb-4">Casino Games</h2>
                <div class="flex gap-3 mb-6 overflow-x-auto pb-3">
                    <button onclick="openGame('coinflip')" class="bg-gray-800 px-5 py-3 rounded-xl font-bold text-yellow-400">Coin Flip</button>
                    <button onclick="openGame('dice')" class="bg-gray-800 px-5 py-3 rounded-xl font-bold text-purple-400">Dice</button>
                </div>

                <div id="game-coinflip" class="game-view glass p-6 rounded-2xl text-center max-w-sm mx-auto">
                    <h3 class="text-2xl font-bold mb-6 text-yellow-400">Coin Flip</h3>
                    <div id="coin-result" class="w-28 h-28 bg-yellow-500 rounded-full mx-auto mb-6 flex items-center justify-center text-4xl font-extrabold text-gray-900">?</div>
                    <input type="number" id="coin-bet" placeholder="Bet Amount" class="w-full p-3 bg-gray-800 rounded-xl mb-4 text-center">
                    <div class="flex gap-3">
                        <button onclick="playCoinFlip('Heads')" class="flex-1 bg-blue-500 p-3 rounded-xl font-bold">Heads</button>
                        <button onclick="playCoinFlip('Tails')" class="flex-1 bg-green-500 p-3 rounded-xl font-bold">Tails</button>
                    </div>
                    <p id="coin-msg" class="mt-4 text-sm font-bold h-6"></p>
                </div>

                <div id="game-dice" class="game-view hidden-section glass p-6 rounded-2xl text-center max-w-sm mx-auto">
                    <h3 class="text-2xl font-bold mb-4 text-purple-400">Dice Roll</h3>
                    <div id="dice-result" class="text-7xl mb-6"><i class="fa-solid fa-dice"></i></div>
                    <input type="number" id="dice-bet" placeholder="Bet Amount" class="w-full p-3 bg-gray-800 rounded-xl mb-4 text-center">
                    <div class="flex gap-3">
                        <button onclick="playDice('under')" class="flex-1 bg-red-500 p-3 rounded-xl font-bold">Under 50</button>
                        <button onclick="playDice('over')" class="flex-1 bg-green-500 p-3 rounded-xl font-bold">Over 50</button>
                    </div>
                    <p id="dice-msg" class="mt-4 text-sm font-bold h-6"></p>
                </div>
            </div>

            <!-- Wallet Page -->
            <div id="page-wallet" class="page-section hidden-section">
                <h2 class="text-2xl sm:text-3xl font-bold mb-6">Wallet</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass p-6 rounded-2xl">
                        <input type="number" id="dep-amount" class="w-full p-3 bg-gray-900 rounded-xl mb-2" placeholder="Deposit Amount">
                        <button onclick="requestTransaction('deposit')" class="w-full bg-green-500 text-gray-900 p-3 rounded-xl font-bold mb-4">Submit Deposit</button>
                        
                        <input type="number" id="with-amount" class="w-full p-3 bg-gray-900 rounded-xl mb-2" placeholder="Withdraw Amount">
                        <button onclick="requestTransaction('withdraw')" class="w-full bg-red-500 text-white p-3 rounded-xl font-bold">Submit Withdraw</button>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <h3 class="text-xl font-bold mb-4">History</h3>
                        <div id="tx-history" class="space-y-3 max-h-80 overflow-y-auto"></div>
                    </div>
                </div>
            </div>

            <!-- Leaderboard Page -->
            <div id="page-leaderboard" class="page-section hidden-section">
                <h2 class="text-2xl font-bold mb-6 text-yellow-400">Top Players</h2>
                <div class="glass p-4 rounded-2xl">
                    <table class="w-full text-left">
                        <tbody id="leaderboard-table" class="divide-y divide-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <!-- Admin Page -->
            <div id="page-admin" class="page-section hidden-section">
                <h2 class="text-2xl font-bold mb-6 text-red-500">Admin Console</h2>
                <div class="glass p-6 rounded-2xl mb-4">
                    <h3 class="text-xl font-bold mb-4">Pending Requests</h3>
                    <div id="admin-requests" class="space-y-3"></div>
                </div>
            </div>

        </main>
    </div>

    <!-- আমাদের কাস্টম জাভাস্ক্রিপ্ট ফাইল (কোনো type="module" নেই) -->
    <script src="app.js"></script>
</body>
</html>
